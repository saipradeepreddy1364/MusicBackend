spring:
  application:
    name: music-player-backend

  # ── Database ──────────────────────────────────────────────────────────────────
  # Supabase PostgreSQL via connection pooler (port 6543 = transaction mode)
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require}
    username: ${DATABASE_USER:postgres.zoxztfjptjkuapqldlha}
    password: ${DATABASE_PASSWORD:Palagiri677245}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      validation-timeout: 5000

  # ── JPA ───────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # CHANGED from "validate" to "none":
      # "validate" causes startup failure when there are no @Entity classes
      # mapped to the DB yet. Use "none" until you add entity classes.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ── Cache (Caffeine in-memory) ────────────────────────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

# ── JioSaavn proxy target ─────────────────────────────────────────────────────
# Your backend calls saavn.dev on behalf of the frontend.
# Override via SAAVN_BASE_URL env var on Render if needed.
jiosaavn:
  base-url: ${SAAVN_BASE_URL:https://saavn.dev/api}

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    # All your endpoints are under /api  e.g. GET /api/search/songs
    context-path: /api
  compression:
    enabled: true
  tomcat:
    threads:
      max: 10
    connection-timeout: 20000

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.musicplayer: INFO
    com.zaxxer.hikari: WARN
    org.springframework.web: WARN