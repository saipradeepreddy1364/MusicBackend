server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: music-player-backend

  # No database — all user data handled by frontend via Supabase
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

jiosaavn:
  # Base URL of the hosted JioSaavn API Worker
  base-url: ${JIOSAAVN_BASE_URL:https://jiosaavn-api.pradeepreddypalagiri.workers.dev}

spring.codec:
  max-in-memory-size: 52428800  # 50 MB — needed for audio download proxy

logging:
  level:
    com.musicplayer: INFO
    org.springframework.web: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always