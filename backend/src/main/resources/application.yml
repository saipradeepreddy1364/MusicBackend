server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: music-player-backend
  
  # Supabase PostgreSQL Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require}
    username: ${DATABASE_USER:postgres.zozztfjptjkuapqldlha}
    password: ${DATABASE_PASSWORD:Palagiri677245}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

