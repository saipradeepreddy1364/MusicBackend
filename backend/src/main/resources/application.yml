spring:
  application:
    name: music-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

package com.music.backend;

import org.springframework.boot.SpringApplication;
import org.springframework.boot.autoconfigure.SpringBootApplication;

@SpringBootApplication
public class MusicBackendApplication {
    public static void main(String[] args) {
        SpringApplication.run(MusicBackendApplication.class, args);
    }
}

package com.music.backend.controller;

import org.springframework.web.bind.annotation.GetMapping;
import org.springframework.web.bind.annotation.RestController;
import java.util.HashMap;
import java.util.Map;

@RestController
public class HealthController {
    @GetMapping("/health")
    public Map<String, String> health() {
        Map<String, String> response = new HashMap<>();
        response.put("status", "UP");
        return response;
    }
}

package com.music.backend.controller;

import org.springframework.web.bind.annotation.GetMapping;
import org.springframework.web.bind.annotation.RequestParam;
import org.springframework.web.bind.annotation.RestController;
import org.springframework.web.client.RestTemplate;

@RestController
public class MusicController {
    private final RestTemplate restTemplate = new RestTemplate();

    @GetMapping("/search")
    public String searchSongs(@RequestParam String query) {
        String url = "https://saavn.dev/api/search/songs?query=" + query;
        return restTemplate.getForObject(url, String.class);
    }
}

package com.music.backend.config;

import org.springframework.context.annotation.Bean;
import org.springframework.context.annotation.Configuration;
import org.springframework.web.client.RestTemplate;

@Configuration
public class AppConfig {
    @Bean
    public RestTemplate restTemplate() {
        return new RestTemplate();
    }
}

FROM eclipse-temurin:21-jdk
WORKDIR /app
COPY target/music-backend.jar app.jar
EXPOSE 8080
CMD ["java", "-jar", "app.jar"]

services:
  - type: web
    name: music-backend
    env: docker
    plan: free
    branch: main
    healthCheckPath: /api/health

